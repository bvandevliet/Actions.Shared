name: Docker build and publish
description: >
  Builds a Docker image and publishes it to a container registry.
  Optionally runs dotnet publish before building the image.
  This action only executes meaningfully on push events; all build/publish steps are skipped otherwise.

on:
  workflow_call:
    inputs:
      CSPROJ_NAME:
        type: string
        description: >
          The name of the .csproj file, expected to exist in an equally named folder in the root of the repository.
          Leave empty to skip dotnet build steps before building the image from the Dockerfile, e.g. for non-dotnet projects.
      DOTNET_VERSION:
        type: string
        default: "8"
        description: The version of the dotnet SDK, see https://github.com/actions/setup-dotnet/tree/v4/#supported-version-syntax.
      IMAGE_NAME:
        type: string
        required: true
        description: The full name of the image to be built and published, format should be registry/(owner)/image_name.
      majorMinorPatch:
        type: string
        required: true
        description: The major.minor.patch version. Use the git-version workflow template to generate this.
      preReleaseLabel:
        type: string
        required: true
        description: The pre-release label. Use the git-version workflow template to generate this.
      semVer:
        type: string
        required: true
        description: The semantic version. Use the git-version workflow template to generate this.
      assemblySemVer:
        type: string
        required: true
        description: The assembly semantic version. Use the git-version workflow template to generate this.
      assemblySemFileVer:
        type: string
        required: true
        description: The assembly semantic file version. Use the git-version workflow template to generate this.
      CR_REGISTRY:
        type: string
        default: docker.io
        description: The container registry to authenticate with.
    secrets:
      CR_USERNAME:
        required: true
        description: The username to authenticate with the container registry.
      CR_PASSWORD:
        required: true
        description: The password to authenticate with the container registry.

env:
  IS_MAIN: ${{ github.event.repository.default_branch == github.ref_name }}

jobs:
  build-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@main
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ inputs.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.semVer }}
            type=semver,enable=${{ env.IS_MAIN == 'true' }},pattern={{major}}.{{minor}},value=${{ inputs.semVer }}
            type=semver,enable=${{ env.IS_MAIN == 'true' }},pattern={{major}},value=${{ inputs.semVer }}
            type=ref,event=branch
            type=raw,enable=${{ env.IS_MAIN == 'false' }},value=${{ inputs.preReleaseLabel }}
            type=raw,enable=${{ env.IS_MAIN == 'true' }},value=nightly
            type=schedule,pattern=nightly
      - name: Setup dotnet
        if: steps.meta.outputs.tags != '' && inputs.CSPROJ_NAME != ''
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.DOTNET_VERSION }}
      - name: Dotnet publish ${{ inputs.CSPROJ_NAME }}
        if: steps.meta.outputs.tags != '' && inputs.CSPROJ_NAME != ''
        run: |
          dotnet publish "${{ inputs.CSPROJ_NAME }}/${{ inputs.CSPROJ_NAME }}.csproj" \
          -c Release /p:UseAppHost=false \
          /p:Version=${{ inputs.semVer }} \
          /p:AssemblyVersion=${{ inputs.assemblySemVer }} \
          /p:FileVersion=${{ inputs.assemblySemFileVer }}
      - name: Set up Buildx
        id: buildx
        if: steps.meta.outputs.tags != ''
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64,linux/arm64
      - name: Login to container registry
        if: steps.meta.outputs.tags != ''
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.CR_REGISTRY }}
          username: ${{ secrets.CR_USERNAME }}
          password: ${{ secrets.CR_PASSWORD }}
      - name: Build and publish ${{ inputs.IMAGE_NAME }} to ${{ inputs.CR_REGISTRY }}
        if: steps.meta.outputs.tags != ''
        uses: docker/build-push-action@v7
        with:
          context: ./${{ inputs.CSPROJ_NAME }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ steps.buildx.outputs.platforms }}
          push: true
