name: Execute GitVersion and create tag

on:
  workflow_call:
    inputs:
      createTag:
        type: boolean
        default: ${{ github.event.repository.default_branch == github.ref_name }} # env.IS_MAIN
        description: Set to false to skip creating a tag and pushing it to the Git repository.
    outputs:
      majorMinorPatch:
        value: ${{ jobs.gitversion.outputs.majorMinorPatch }}
      preReleaseLabel:
        value: ${{ jobs.gitversion.outputs.preReleaseLabel }}
      semVer:
        value: ${{ jobs.gitversion.outputs.semVer }}
      assemblySemVer:
        value: ${{ jobs.gitversion.outputs.assemblySemVer }}
      assemblySemFileVer:
        value: ${{ jobs.gitversion.outputs.assemblySemFileVer }}

env:
  IS_MAIN: ${{ github.event.repository.default_branch == github.ref_name }}

jobs:
  gitversion:
    name: Execute GitVersion and create tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      majorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}
      preReleaseLabel: ${{ steps.gitversion.outputs.preReleaseLabel }}
      semVer: ${{ steps.gitversion.outputs.semVer }}
      assemblySemVer: ${{ steps.gitversion.outputs.assemblySemVer }}
      assemblySemFileVer: ${{ steps.gitversion.outputs.assemblySemFileVer }}
    steps:
      - name: Unshallow checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0
      - name: Checkout GitVersion configuration
        uses: actions/checkout@main
        with:
          repository: bvandevliet/Actions.Shared
          sparse-checkout: GitVersion.yml
          sparse-checkout-cone-mode: false
          path: .actions-shared
      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: "6.x.x"
      - name: Execute GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4
        with:
          configFilePath: .actions-shared/GitVersion.yml
      - name: Output GitVersion results
        run: |
          echo "GitVersion majorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}"
          echo "GitVersion preReleaseLabel: ${{ steps.gitversion.outputs.preReleaseLabel }}"
          echo "GitVersion semVer: ${{ steps.gitversion.outputs.semVer }}"
          echo "GitVersion assemblySemVer: ${{ steps.gitversion.outputs.assemblySemVer }}"
          echo "GitVersion assemblySemFileVer: ${{ steps.gitversion.outputs.assemblySemFileVer }}"
      - name: Create Git tag
        if: inputs.createTag
        continue-on-error: true
        run: |
          if [ "${{ env.IS_MAIN }}" == "true" ]; then
            git tag v${{ steps.gitversion.outputs.majorMinorPatch }}
            git push origin v${{ steps.gitversion.outputs.majorMinorPatch }}
          else
            git tag v${{ steps.gitversion.outputs.semVer }}
            git push origin v${{ steps.gitversion.outputs.semVer }}
          fi
